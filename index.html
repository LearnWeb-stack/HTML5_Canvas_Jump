<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jump Game</title>
<style>
  body {
    margin: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
  }

  #arena {
    position: relative;
    width: 600px;
    height: 300px;
    background: #16213e;
    border: 2px solid #0f3460;
    overflow: hidden;
  }

  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: #0f3460;
  }

  #player {
    position: absolute;
    width: 30px;
    height: 30px;
    background: #e94560;
    bottom: 40px;
    left: 50px;
  }

  #wall {
    position: absolute;
    width: 20px;
    height: 80px;
    background: #f5a623;
    bottom: 40px;
    left: 400px;
  }

  #hint {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
    color: #ffffff33;
    font-size: 13px;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="arena">
  <div id="player"></div>
  <div id="wall"></div>
  <div id="ground"></div>
  <div id="hint">SPACE to jump</div>
</div>

<script>
  const player       = document.getElementById('player');
  const arena        = document.getElementById('arena');
  const hint         = document.getElementById('hint');

  const GRAVITY      = 0.6;
  const JUMP_FORCE   = -12;
  const groundOffset = 40;

  let x         = 50;
  let velX      = 2;
  let y         = 0;
  let velY      = 0;
  let hasJumped = false;
  const maxX    = arena.offsetWidth - 30;

  // Spacebar to jump
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (!hasJumped) {
        velY      = JUMP_FORCE;
        hasJumped = true;
        hint.style.opacity = '0';
      }
    }
  });

  function loop() {
    // 1. Horizontal movement
    x += velX;
    if (x >= maxX || x <= 0) velX *= -1;

    // 2. Apply gravity every frame
    velY += GRAVITY;
    y    -= velY;
    if (y <= 0) { y = 0; velY = 0; hasJumped = false; }

    // 3. Apply to DOM
    player.style.left   = x + 'px';
    player.style.bottom = (groundOffset + y) + 'px';

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
</script>
</body>
</html>
